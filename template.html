<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
{{KATEX_CSS}}
<style>
  @page {
    size: A4;
    margin: 20mm 18mm;
  }
  body {
    font-family: 'Noto Serif CJK KR', 'Noto Serif KR', 'Apple SD Gothic Neo', serif;
    font-size: 11.5pt;
    line-height: 1.75;
    color: #1a1a1a;
    max-width: 100%;
  }
  h1 {
    font-family: 'Noto Sans CJK KR', 'Apple SD Gothic Neo', sans-serif;
    font-size: 24pt;
    color: #1a1a1a;
    border-bottom: 3px solid #1a1a1a;
    padding-bottom: 8px;
    margin-top: 0;
    margin-bottom: 4px;
  }
  h1 + .subtitle, h1 + blockquote {
    font-size: 12pt;
    color: #666;
    margin-bottom: 30px;
    font-family: 'Noto Sans CJK KR', sans-serif;
    font-style: normal;
    background: none;
    border: none;
    padding-left: 0;
  }
  h2 {
    font-family: 'Noto Sans CJK KR', 'Apple SD Gothic Neo', sans-serif;
    font-size: 17pt;
    color: #2c3e50;
    border-left: 5px solid #2c3e50;
    padding-left: 12px;
    margin-top: 32px;
    margin-bottom: 14px;
    page-break-after: avoid;
  }
  h3 {
    font-family: 'Noto Sans CJK KR', 'Apple SD Gothic Neo', sans-serif;
    font-size: 13.5pt;
    color: #34495e;
    margin-top: 22px;
    margin-bottom: 10px;
    page-break-after: avoid;
  }
  h4 {
    font-family: 'Noto Sans CJK KR', 'Apple SD Gothic Neo', sans-serif;
    font-size: 12pt;
    color: #34495e;
    margin-top: 16px;
    margin-bottom: 6px;
    page-break-after: avoid;
  }
  p { margin: 8px 0; }
  blockquote {
    border-left: 3px solid #95a5a6;
    background: #f6f7f8;
    padding: 10px 16px;
    margin: 14px 0;
    font-style: italic;
    color: #444;
  }
  table {
    border-collapse: collapse;
    margin: 14px auto;
    font-size: 11pt;
    width: 95%;
  }
  th, td {
    border: 1px solid #bbb;
    padding: 7px 11px;
    text-align: left;
  }
  th {
    background: #ecf0f1;
    font-family: 'Noto Sans CJK KR', sans-serif;
    font-weight: 600;
  }
  ul, ol { padding-left: 24px; margin: 8px 0; }
  li { margin: 4px 0; }
  code {
    background: #f4f4f4;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10.5pt;
    font-family: 'Menlo', 'Consolas', monospace;
  }
  pre {
    background: #f4f4f4;
    padding: 10px 14px;
    border-radius: 4px;
    overflow-x: auto;
    font-size: 10pt;
  }
  pre code {
    background: none;
    padding: 0;
  }
  hr {
    border: none;
    border-top: 1px dashed #999;
    margin: 26px 0;
  }
  .boxed {
    border: 2px solid #2c3e50;
    background: #f8f9fa;
    padding: 12px 16px;
    margin: 14px 0;
    border-radius: 4px;
  }
  .keypoint {
    background: #fff8e1;
    border-left: 4px solid #f39c12;
    padding: 10px 14px;
    margin: 14px 0;
  }
  .part-header {
    background: #2c3e50;
    color: white;
    padding: 14px 20px;
    margin: 36px 0 20px 0;
    font-family: 'Noto Sans CJK KR', sans-serif;
    font-size: 19pt;
    border-radius: 4px;
  }
  strong { color: #1a1a1a; font-weight: 600; }
  .katex { font-size: 1.05em !important; }
  .katex-display { margin: 12px 0 !important; }
  a { color: #2980b9; }
</style>
</head>
<body>
{{CONTENT}}
</body>
</html>
